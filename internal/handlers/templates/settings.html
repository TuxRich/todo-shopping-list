{{define "content"}}
<div class="space-y-8">
    <h1 class="text-2xl font-bold text-gray-900">Settings</h1>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Categories</h2>
            <button onclick="document.getElementById('new-cat-modal').classList.remove('hidden')"
                class="bg-primary-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-primary-700 transition-colors">
                + Add
            </button>
        </div>
        <div id="categories-list">
            {{template "categories-list" .Categories}}
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Tags</h2>
            <button onclick="document.getElementById('new-tag-modal').classList.remove('hidden')"
                class="bg-primary-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-primary-700 transition-colors">
                + Add
            </button>
        </div>
        <div id="tags-list">
            {{template "tags-list" .Tags}}
        </div>
    </div>
</div>

<div id="new-cat-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onclick="event.stopPropagation()">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">New Category</h2>
        <form hx-post="/settings/categories" hx-target="#categories-list" hx-swap="innerHTML"
            hx-on::after-request="if(event.detail.successful) { document.getElementById('new-cat-modal').classList.add('hidden'); this.reset(); }">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="name" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
                    <input type="color" name="color" value="#6366f1" class="w-full h-10 rounded-lg border border-gray-300 cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Icon (emoji)</label>
                    <input type="text" name="icon" value="📁" maxlength="4" class="w-20 rounded-lg border border-gray-300 px-3 py-2 text-sm text-center focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button type="button" onclick="document.getElementById('new-cat-modal').classList.add('hidden')"
                    class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button>
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Create</button>
            </div>
        </form>
    </div>
</div>

<div id="new-tag-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onclick="event.stopPropagation()">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">New Tag</h2>
        <form hx-post="/settings/tags" hx-target="#tags-list" hx-swap="innerHTML"
            hx-on::after-request="if(event.detail.successful) { document.getElementById('new-tag-modal').classList.add('hidden'); this.reset(); }">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="name" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
                    <input type="color" name="color" value="#8b5cf6" class="w-full h-10 rounded-lg border border-gray-300 cursor-pointer">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button type="button" onclick="document.getElementById('new-tag-modal').classList.add('hidden')"
                    class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button>
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Create</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('new-cat-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
});
document.getElementById('new-tag-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
});
</script>
{{end}}
