{{define "categories-list"}}
{{if .}}
<div class="space-y-2">
    {{range .}}
    <div class="flex items-center justify-between p-3 rounded-lg border border-gray-100 hover:bg-gray-50 transition-colors group">
        <div class="flex items-center space-x-3">
            <span class="text-xl">{{.Icon}}</span>
            <span class="font-medium text-gray-800">{{.Name}}</span>
            <span class="w-4 h-4 rounded-full inline-block" style="background-color: {{.Color}}"></span>
        </div>
        <div class="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="editCategory({{.ID}}, '{{.Name}}', '{{.Color}}', '{{.Icon}}')"
                class="text-gray-400 hover:text-gray-600 p-1.5 rounded hover:bg-gray-100 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button hx-delete="/settings/categories/{{.ID}}" hx-target="#categories-list" hx-swap="innerHTML" hx-confirm="Delete this category?"
                class="text-gray-400 hover:text-red-500 p-1.5 rounded hover:bg-red-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>
    </div>
    {{end}}
</div>
{{else}}
<p class="text-gray-400 text-sm py-4 text-center">No categories yet</p>
{{end}}
{{end}}

{{define "tags-list"}}
{{if .}}
<div class="flex flex-wrap gap-3">
    {{range .}}
    <div class="flex items-center space-x-2 p-2 rounded-lg border border-gray-100 hover:bg-gray-50 transition-colors group">
        <span class="px-2.5 py-1 rounded-full text-xs font-medium text-white" style="background-color: {{.Color}}">{{.Name}}</span>
        <div class="flex items-center space-x-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="editTag({{.ID}}, '{{.Name}}', '{{.Color}}')"
                class="text-gray-400 hover:text-gray-600 p-1 rounded hover:bg-gray-100 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button hx-delete="/settings/tags/{{.ID}}" hx-target="#tags-list" hx-swap="innerHTML" hx-confirm="Delete this tag?"
                class="text-gray-400 hover:text-red-500 p-1 rounded hover:bg-red-50 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>
    </div>
    {{end}}
</div>
{{else}}
<p class="text-gray-400 text-sm py-4 text-center">No tags yet</p>
{{end}}
{{end}}
